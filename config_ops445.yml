---
- name: Configure OPS445 CentOS VM
  hosts: vmlab
  become: yes
  vars:
    seneca_id: mjndolla-wafo

  tasks:
    - name: Gather Facts
      ansible.builtin.setup:

    - name: Update Apache (httpd)
      ansible.builtin.yum:
        name: httpd
        state: latest

    - name: Install epel-release
      ansible.builtin.yum:
        name: epel-release
        state: present

    - name: Remove tree package
      ansible.builtin.yum:
        name: tree
        state: absent

    - name: Set hostname to Seneca ID
      ansible.builtin.hostname:
        name: "{{ seneca_id }}"

    - name: Create new user with Seneca ID and sudo access
      ansible.builtin.user:
        name: "{{ seneca_id }}"
        groups: wheel
        shell: /bin/bash
        create_home: yes

    - name: Ensure .ssh directory exists for new user
      ansible.builtin.file:
        path: "/home/{{ seneca_id }}/.ssh"
        state: directory
        owner: "{{ seneca_id }}"
        group: "{{ seneca_id }}"
        mode: '0700'

    - name: Wait for SSH to be ready for the new user
      ansible.builtin.pause:
        seconds: 5

    - name: Copy public SSH key for passwordless login
      ansible.builtin.copy:
        src: "/home/student/.ssh/id_rsa.pub"
        dest: "/home/{{ seneca_id }}/.ssh/authorized_keys"
        owner: "{{ seneca_id }}"
        group: "{{ seneca_id }}"
        mode: '0600'

    - name: Create ops445 lab directory structure
      ansible.builtin.file:
        path: "/home/{{ seneca_id }}/ops445/lab"
        state: directory
        owner: "{{ seneca_id }}"
        group: "{{ seneca_id }}"
        mode: '0755'
